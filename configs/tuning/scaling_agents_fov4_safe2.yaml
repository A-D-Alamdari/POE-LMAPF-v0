  #   lns2               3     7     9    12     14
  #   pbs                6    22    31    53    167
  #   pibt2              5    15    18    26     27
  #
  # Every non-anytime solver clears p99 in under one
  # second; lacam3 (anytime) deliberately uses the full
  # budget as its quality knob.  10 s is the §5.1 paper
  # default (docs/experimental_setup.md) and the right
  # trade-off here.
  solver_timeout_s: 10.0
  log_violations_timeline: true

